[flavor_groups.disable_shaders]
name = "Disable Shaders"
description = "Leave this unchecked to keep Iris shader support installed. Select it to disable Iris, which may improve FPS on lower-end systems."
side = "client"
choices = ["disable_shaders_off", "disable_shaders_on"]

[flavor_groups.disable_high_render]
name = "Disable High Chunk Rendering"
description = "Leave this unchecked to keep Voxy far-distance LOD chunk rendering installed. Select it to disable Voxy if it is too heavy or unstable on your system."
side = "client"
choices = ["disable_high_render_off", "disable_high_render_on"]

[flavor_groups.disable_punchy]
name = "Disable Punchy"
description = "Leave this unchecked to keep Punchy installed. Select it to disable Punchy first person animations."
side = "client"
choices = ["disable_punchy_off", "disable_punchy_on"]

[flavor_groups.disable_fresh_animations]
name = "Disable Fresh Animations"
description = "Leave this unchecked to keep Global Packs installed for Fresh Animations resource pack support. Select it for a more vanilla-like animation experience."
side = "client"
choices = ["disable_fresh_animations_off", "disable_fresh_animations_on"]

[metafile.iris]
flavors = "disable_shaders_off"

[metafile.voxy]
flavors = "disable_high_render_off"

[metafile.punchy-fpa]
flavors = "disable_punchy_off"

[metafile.globalpacks]
flavors = "disable_fresh_animations_off"
